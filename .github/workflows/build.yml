name: Build TWRP for Redmi Note 15 4G (Spinel)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build TWRP
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        path: device_tree
      
    - name: Set up build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python-is-python3 dos2unix
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

    - name: Initialize TWRP Workspace
      run: |
        mkdir ~/twrp
        cd ~/twrp
        ~/bin/repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        
    - name: Sync TWRP Source
      run: |
        cd ~/twrp
        ~/bin/repo sync -j$(nproc --all) --force-sync
        
    - name: Prepare Device Tree
      run: |
        mkdir -p ~/twrp/device/xiaomi/vendor_boot
        cp -r $GITHUB_WORKSPACE/device_tree/* ~/twrp/device/xiaomi/vendor_boot/
        find ~/twrp/device/xiaomi/vendor_boot -type f -exec dos2unix {} +
        
    - name: Compile TWRP
      run: |
        cd ~/twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch omni_vendor_boot-eng
        mka vendorbootimage
        
    - name: Upload TWRP Image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Spinel-vendor_boot
        path: ~/twrp/out/target/product/vendor_boot/vendor_boot.img
